name: Release Obsidian Plugin
on:
  push:
    tags:
    - '*'
jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # otherwise, you will failed to push refs to dest repo
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
    - name: Build plugin
      run: npm run build

    - name: Package zip
      run: |
        zip -r ${{ github.event.repository.name }}.zip main.js manifest.json styles.css README.md

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        generate_release_notes: true
        files: |
          ${{ github.event.repository.name }}.zip
          main.js
          manifest.json
          styles.css
        draft: false
        prerelease: false
