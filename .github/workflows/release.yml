name: Release Obsidian Plugin
on:
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  check-release-needed:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.tag-check.outputs.should_release }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Get version from package.json
      id: get-version
      run: |
        VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Validate version is semver
      run: |
        VERSION="${{ steps.get-version.outputs.version }}"
        SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
        if ! echo "$VERSION" | grep -qE "$SEMVER_REGEX"; then
          echo "::error::Version '$VERSION' is not valid semver (MAJOR.MINOR.PATCH required)"
          exit 1
        fi
        echo "Version '$VERSION' is valid semver"
    - name: Check if tag already exists
      id: tag-check
      run: |
        TAG="${{ steps.get-version.outputs.version }}"
        if git tag -l "$TAG" | grep -q .; then
          echo "::notice::Tag '$TAG' already exists, skipping release"
          echo "should_release=false" >> $GITHUB_OUTPUT
        else
          echo "Tag '$TAG' does not exist, proceeding with release"
          echo "should_release=true" >> $GITHUB_OUTPUT
        fi

  release:
    if: github.event_name == 'workflow_dispatch' || needs.check-release-needed.outputs.should_release == 'true'
    needs: [check-release-needed]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
    - name: Build plugin
      run: npm run build

    - name: Validate version is semver
      run: |
        VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
        SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
        if ! echo "$VERSION" | grep -qE "$SEMVER_REGEX"; then
          echo "::error::Version '$VERSION' is not valid semver (MAJOR.MINOR.PATCH required)"
          exit 1
        fi
        echo "Version '$VERSION' is valid semver"

    - name: Sync version to manifest.json
      run: |
        VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" manifest.json
        echo "Synced manifest.json version to $VERSION"

    - name: Get version from package.json
      id: pkg-version
      run: |
        VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Generate random suffix
      id: random
      run: |
        SUFFIX=$(head /dev/urandom | LC_ALL=C tr -dc 'a-z0-9' | head -c 8)
        echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT

    - name: Package zip
      run: |
        zip -r ${{ github.event.repository.name }}.zip main.js manifest.json styles.css README.md

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && format('test-{0}-{1}', github.run_id, steps.random.outputs.suffix) || steps.pkg-version.outputs.version }}
        generate_release_notes: true
        files: |
          ${{ github.event.repository.name }}.zip
          main.js
          manifest.json
          styles.css
        draft: false
        prerelease: ${{ github.event_name == 'workflow_dispatch' }}
