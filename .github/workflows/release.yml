name: Release Obsidian Plugin
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'package.json'
jobs:
  check-version-change:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version-check.outputs.changed }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Check if version changed and is valid semver
      id: version-check
      run: |
        PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | grep '"version"' | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/' || echo "")
        CURRENT=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
        echo "previous=$PREVIOUS" >> $GITHUB_OUTPUT
        echo "current=$CURRENT" >> $GITHUB_OUTPUT
        # Validate semver format: MAJOR.MINOR.PATCH with optional prerelease/build metadata
        SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
        if ! echo "$CURRENT" | grep -qE "$SEMVER_REGEX"; then
          echo "::error::Version '$CURRENT' is not valid semver (MAJOR.MINOR.PATCH required)"
          echo "changed=false" >> $GITHUB_OUTPUT
          exit 1
        fi
        if [ -z "$PREVIOUS" ] || [ "$PREVIOUS" != "$CURRENT" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Version changed: $PREVIOUS -> $CURRENT"
        else
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "Version unchanged: $CURRENT"
        fi

  release:
    if: github.event_name == 'workflow_dispatch' || needs.check-version-change.outputs.version_changed == 'true'
    needs: [check-version-change]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
    - name: Build plugin
      run: npm run build

    - name: Validate version is semver
      run: |
        VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
        SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
        if ! echo "$VERSION" | grep -qE "$SEMVER_REGEX"; then
          echo "::error::Version '$VERSION' is not valid semver (MAJOR.MINOR.PATCH required)"
          exit 1
        fi
        echo "Version '$VERSION' is valid semver"

    - name: Sync version to manifest.json
      run: |
        VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" manifest.json
        echo "Synced manifest.json version to $VERSION"

    - name: Get version from package.json
      id: pkg-version
      run: |
        VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Generate random suffix
      id: random
      run: |
        SUFFIX=$(head /dev/urandom | LC_ALL=C tr -dc 'a-z0-9' | head -c 8)
        echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT

    - name: Package zip
      run: |
        zip -r ${{ github.event.repository.name }}.zip main.js manifest.json styles.css README.md

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && format('test-{0}-{1}', github.run_id, steps.random.outputs.suffix) || format('v{0}', steps.pkg-version.outputs.version) }}
        generate_release_notes: true
        files: |
          ${{ github.event.repository.name }}.zip
          main.js
          manifest.json
          styles.css
        draft: false
        prerelease: ${{ github.event_name == 'workflow_dispatch' }}
