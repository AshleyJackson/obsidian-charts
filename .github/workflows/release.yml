name: Release Obsidian Plugin
on:
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # otherwise, you will failed to push refs to dest repo
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
    - name: Build plugin
      run: npm run build

    - name: Generate random suffix
      id: random
      run: echo "suffix=$(head /dev/urandom | LC_ALL=C tr -dc 'a-z0-9' | head -c 8)" >> $GITHUB_OUTPUT

    - name: Package zip
      run: |
        zip -r ${{ github.event.repository.name }}.zip main.js manifest.json styles.css README.md

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && format('test-{0}-{1}', github.run_id, steps.random.outputs.suffix) || format('{0}-{1}', github.ref_name, steps.random.outputs.suffix) }}
        generate_release_notes: true
        files: |
          ${{ github.event.repository.name }}.zip
          main.js
          manifest.json
          styles.css
        draft: false
        prerelease: ${{ github.event_name == 'workflow_dispatch' }}
